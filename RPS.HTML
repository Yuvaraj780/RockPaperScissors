<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPS</title>
    <link rel="stylesheet" href="RPS.CSS" />
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <div class="game-tools">
      <div class="moves-buttons">
        <button class="rps" onclick="playgame('rock')">
          <img src="rock-emoji.png" />
        </button>
        <button class="rps" onclick="playgame('paper')">
          <img src="paper-emoji.png" />
        </button>
        <button class="rps" onclick="playgame('scissors')">
          <img src="scissors-emoji.png" />
        </button>
      </div>
      <div class="after-moves">
        <p id="match-result"></p>
        <p id="choice"></p>
        <p id="score">Wins: 0, Losses: 0, Ties: 0</p>
        <div class="play-buttons">
          <button id="reset-button">Reset Score</button>
          <button id="autoplay-button" onclick="autoplay()">Auto Play</button>
        </div>
      </div>
    </div>
    <script src="RPS.JS"></script>
  </body>
</html>
